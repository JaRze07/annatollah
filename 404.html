<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniaTollah</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1c1c1c; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
        .card { text-align: center; max-width: 400px; }
        .icon { font-size: 64px; margin-bottom: 16px; }
        h1 { color: #2E7D32; font-size: 28px; margin-bottom: 8px; }
        .id { background: #E8F5E9; color: #1B5E20; font-family: monospace; font-size: 18px; padding: 12px 20px; border-radius: 12px; margin: 16px 0; display: inline-block; word-break: break-all; }
        p { color: #666; line-height: 1.5; margin: 8px 0; }
        .btn { display: inline-block; background: #2E7D32; color: #fff; text-decoration: none; padding: 14px 32px; border-radius: 12px; font-size: 16px; margin-top: 16px; }
        .btn:active { background: #1B5E20; }
        .small { margin-top: 24px; font-size: 13px; color: #999; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🌱</div>
        <h1>AniaTollah</h1>
        <div id="plant-id" class="id"></div>
        <p id="status"></p>
        <a id="deep-link" class="btn" style="display:none">Otwórz w AniaTollah</a>
        <br>
        <a id="intent-link" class="btn" style="display:none;background:#43A047;margin-top:8px">Otwórz aplikację (Android)</a>
        <p class="small">Jeśli aplikacja się nie otworzyła, zainstaluj AniaTollah na urządzeniu Android i kliknij powyższy przycisk.</p>
    </div>
    <script>
        var path = window.location.pathname.replace(/^\/annatollah\/?/, '').replace(/\/$/, '');
        // Also check query param (from 404 redirect)
        var params = new URLSearchParams(window.location.search);
        var plantId = path || params.get('p') || null;

        var el = document.getElementById('plant-id');
        var status = document.getElementById('status');
        var deepBtn = document.getElementById('deep-link');
        var intentBtn = document.getElementById('intent-link');

        if (plantId) {
            el.textContent = plantId;
            var deepLink = 'annatollah://plant/' + plantId;
            var intentLink = 'intent://plant/' + plantId + '#Intent;scheme=annatollah;package=com.garden.tracker;end';

            // Show buttons immediately
            status.textContent = 'Kliknij aby otworzyć w aplikacji:';
            deepBtn.href = deepLink;
            deepBtn.style.display = 'inline-block';
            intentBtn.href = intentLink;
            intentBtn.style.display = 'inline-block';

            // Try auto-open via intent (more reliable on Android)
            window.location.href = intentLink;
        } else {
            el.textContent = 'AniaTollah';
            status.textContent = 'Aplikacja do śledzenia roślin w ogrodzie';
        }
    </script>
</body>
</html>
